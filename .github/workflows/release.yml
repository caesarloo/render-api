name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip 'v' prefix from tag for release version
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#v}"
          NOTES_FILE="RELEASE_v${VERSION}.md"
          
          echo "Tag: ${RAW_TAG} → Version: ${VERSION}"
          echo "Notes file: ${NOTES_FILE}"
          
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Release notes not found: $NOTES_FILE"
            exit 1
          fi
          
          gh release create "$VERSION" \
            dist/main.js dist/manifest.json dist/styles.css \
            --title "Render API v${VERSION}" \
            --notes-file "$NOTES_FILE"
          
          gh release edit "$VERSION" --latest
