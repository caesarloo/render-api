name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="RELEASE_${TAG}.md"
          
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Release notes not found: $NOTES_FILE"
            exit 1
          fi
          
          gh release create "$TAG" \
            dist/main.js dist/manifest.json dist/styles.css \
            --title "Render API ${TAG}" \
            --notes-file "$NOTES_FILE"
          
          gh release edit "$TAG" --latest
